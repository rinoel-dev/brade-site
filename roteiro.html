<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRADE · Call Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* ============================================
     THEMES — orange (default), dark, light, mono
     ============================================ */
  :root,
  [data-theme="orange"] {
    --brand-accent: #FF5A00;
    --brand-accent-dim: #D94A00;
    --brand-accent-soft: rgba(255, 90, 0, 0.10);
    --brand-accent-ghost: rgba(255, 90, 0, 0.18);

    --bg: #FAFAF8;
    --bg-elev: #FFFFFF;
    --bg-elev-2: #F0EDE5;
    --ink: #1A1612;
    --ink-dim: #5C5248;
    --ink-faint: #9A8F82;

    --line: #E8E3D8;
    --line-bright: #D0C9BA;

    --paper: #FFFFFF;
    --paper-ink: #1A1612;
    --paper-ink-dim: #6B5F54;
    --paper-line: #ECE8DE;

    --accent: var(--brand-accent);
    --accent-dim: var(--brand-accent-dim);
    --accent-soft: var(--brand-accent-soft);

    --synced-bg: #FFF3D9;
    --synced-bd: #F2A800;
    --synced-ink: #8B5A00;

    --capture-bg: #E8F5E9;
    --capture-bd: #4CAF50;
    --capture-ink: #1B5E20;

    --ref-bg: #FFE3D2;
    --ref-bd: var(--brand-accent);
    --ref-ink: #B84200;

    --danger: #D93838;
  }

  [data-theme="dark"] {
    --brand-accent: #FF5A00;
    --brand-accent-dim: #CC4500;
    --brand-accent-soft: rgba(255, 90, 0, 0.14);
    --brand-accent-ghost: rgba(255, 90, 0, 0.22);

    --bg: #181514;
    --bg-elev: #221E1C;
    --bg-elev-2: #2C2724;
    --ink: #F0EBE2;
    --ink-dim: #9E9488;
    --ink-faint: #645A50;

    --line: #332C28;
    --line-bright: #443C36;

    --paper: #221E1C;
    --paper-ink: #F0EBE2;
    --paper-ink-dim: #9E9488;
    --paper-line: #332C28;

    --accent: var(--brand-accent);
    --accent-dim: var(--brand-accent-dim);
    --accent-soft: var(--brand-accent-soft);

    --synced-bg: rgba(242, 168, 0, 0.14);
    --synced-bd: #F2A800;
    --synced-ink: #F2C762;

    --capture-bg: rgba(76, 175, 80, 0.14);
    --capture-bd: #4CAF50;
    --capture-ink: #7BC67F;

    --ref-bg: rgba(255, 90, 0, 0.14);
    --ref-bd: var(--brand-accent);
    --ref-ink: #FF8C4A;

    --danger: #E85858;
  }

  [data-theme="light"] {
    --brand-accent: #FF5A00;
    --brand-accent-dim: #D94A00;
    --brand-accent-soft: rgba(255, 90, 0, 0.10);
    --brand-accent-ghost: rgba(255, 90, 0, 0.18);

    --bg: #FFFFFF;
    --bg-elev: #F7F7F7;
    --bg-elev-2: #EEEEEE;
    --ink: #181818;
    --ink-dim: #525252;
    --ink-faint: #8A8A8A;

    --line: #EAEAEA;
    --line-bright: #D0D0D0;

    --paper: #FFFFFF;
    --paper-ink: #181818;
    --paper-ink-dim: #525252;
    --paper-line: #EAEAEA;

    --accent: var(--brand-accent);
    --accent-dim: var(--brand-accent-dim);
    --accent-soft: var(--brand-accent-soft);

    --synced-bg: #FFF6DD;
    --synced-bd: #F2A800;
    --synced-ink: #8B5A00;

    --capture-bg: #E8F5E9;
    --capture-bd: #4CAF50;
    --capture-ink: #1B5E20;

    --ref-bg: #FFE3D2;
    --ref-bd: var(--brand-accent);
    --ref-ink: #B84200;

    --danger: #D93838;
  }

  [data-theme="mono"] {
    --brand-accent: #1A1A1A;
    --brand-accent-dim: #000000;
    --brand-accent-soft: rgba(0, 0, 0, 0.06);
    --brand-accent-ghost: rgba(0, 0, 0, 0.12);

    --bg: #F5F5F3;
    --bg-elev: #FFFFFF;
    --bg-elev-2: #EBEBE8;
    --ink: #1A1A1A;
    --ink-dim: #5C5C5C;
    --ink-faint: #9A9A9A;

    --line: #E5E5E2;
    --line-bright: #C8C8C5;

    --paper: #FFFFFF;
    --paper-ink: #1A1A1A;
    --paper-ink-dim: #5C5C5C;
    --paper-line: #E5E5E2;

    --accent: var(--brand-accent);
    --accent-dim: var(--brand-accent-dim);
    --accent-soft: var(--brand-accent-soft);

    --synced-bg: #F5F1E4;
    --synced-bd: #8B7D50;
    --synced-ink: #5C4F28;

    --capture-bg: #E8EDE3;
    --capture-bd: #4A5D3A;
    --capture-ink: #1F2A15;

    --ref-bg: #ECECEC;
    --ref-bd: #3A3A3A;
    --ref-ink: #1A1A1A;

    --danger: #A62020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Newsreader', Georgia, serif;
    font-size: 15px;
    line-height: 1.55;
    overflow: hidden;
    transition: background 0.2s, color 0.2s;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-bright); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; color: inherit; background: transparent; border: none; outline: none; }

  .app {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr) 340px;
    height: 100vh;
    overflow: hidden;
  }

  /* LEFT COLUMN */
  .col-left {
    background: var(--bg);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .brand-bar {
    height: 60px;
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    gap: 10px;
  }
  .brand-box {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .brand-logo {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 4px;
  }
  .brand-logo svg { width: 100%; height: 100%; }
  .brand-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--ink);
  }
  .brand-text::after { content: '.'; color: var(--accent); }

  .theme-btn {
    color: var(--ink-dim);
    padding: 6px 9px;
    border-radius: 3px;
    font-size: 14px;
    line-height: 1;
  }
  .theme-btn:hover { background: var(--bg-elev); color: var(--accent); }

  .left-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px 0 100px; }

  .section { padding: 10px 16px 18px; }
  .section + .section {
    border-top: 1px solid var(--line);
    margin-top: 4px;
    padding-top: 18px;
  }
  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .add-inline {
    color: var(--accent);
    font-size: 15px;
    line-height: 1;
    padding: 4px 7px;
    border-radius: 3px;
    transition: background 0.15s;
    font-weight: 700;
  }
  .add-inline:hover { background: var(--accent-soft); }

  .tree { display: flex; flex-direction: column; gap: 2px; }
  .tree-group { margin-bottom: 2px; }
  .tree-parent {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    padding: 7px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    border-radius: 3px;
    transition: background 0.1s;
  }
  .tree-parent:hover { background: var(--bg-elev); color: var(--ink); }
  .caret {
    display: inline-block;
    width: 10px;
    font-size: 9px;
    color: var(--ink-faint);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .tree-parent.collapsed .caret { transform: rotate(-90deg); }
  .parent-label {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .parent-actions, .item-actions, .profile-actions {
    display: none;
    gap: 2px;
    flex-shrink: 0;
  }
  .tree-parent:hover .parent-actions,
  .tree-item:hover .item-actions,
  .profile-item:hover .profile-actions,
  .channel-item:hover .item-actions { display: flex; }
  .icon-btn {
    color: var(--ink-faint);
    font-size: 12px;
    padding: 2px 5px;
    border-radius: 2px;
    line-height: 1;
  }
  .icon-btn:hover { color: var(--accent); background: var(--accent-soft); }
  .icon-btn.danger:hover { color: var(--danger); background: rgba(217, 56, 56, 0.1); }

  .tree-children {
    display: flex;
    flex-direction: column;
    padding-left: 18px;
    margin: 2px 0 6px;
    position: relative;
  }
  .tree-children::before {
    content: '';
    position: absolute;
    left: 13px;
    top: 4px;
    bottom: 4px;
    width: 1px;
    background: var(--line);
  }
  .tree-children.collapsed { display: none; }

  .tree-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px 7px 14px;
    font-family: 'Newsreader', serif;
    font-size: 14px;
    color: var(--ink-dim);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    position: relative;
    min-width: 0;
  }
  .tree-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    width: 9px;
    height: 1px;
    background: var(--line);
  }
  .tree-item:hover { background: var(--bg-elev); color: var(--ink); }
  .tree-item.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 500;
  }
  .tree-item.active::after {
    content: '';
    position: absolute;
    left: 5px;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
  }
  .item-label, .p-label {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    position: relative;
  }
  .channel-item:hover { background: var(--bg-elev); color: var(--ink); }
  .channel-item.active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .channel-item.active::before {
    content: '';
    position: absolute;
    left: 4px;
    top: 7px;
    bottom: 7px;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
  }

  .obj-list { display: flex; flex-direction: column; gap: 5px; }
  .obj-item {
    padding: 10px 30px 10px 12px;
    background: var(--bg-elev);
    border-left: 2px solid var(--line-bright);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .obj-item:hover {
    border-left-color: var(--accent);
    background: var(--bg-elev-2);
  }
  .obj-item.active {
    border-left-color: var(--accent);
    background: var(--bg-elev-2);
  }
  .obj-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .obj-sub {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-dim);
    margin-top: 3px;
    line-height: 1.4;
  }
  .obj-del {
    position: absolute;
    top: 6px;
    right: 6px;
    color: var(--ink-faint);
    font-size: 11px;
    padding: 3px 5px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .obj-item:hover .obj-del { opacity: 1; }
  .obj-del:hover { color: var(--danger); background: rgba(217, 56, 56, 0.1); }

  /* CENTER COLUMN */
  .col-center {
    background: var(--paper);
    color: var(--paper-ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .toolbar {
    min-height: 60px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    border-bottom: 1px solid var(--paper-line);
    background: var(--paper);
    flex-shrink: 0;
    overflow-x: auto;
  }
  .mobile-selects {
    display: none;
    gap: 8px;
    flex: 1;
    padding-left: 10px;
  }
  .mobile-select {
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--paper-ink);
    border: 1px solid var(--paper-line);
    border-radius: 3px;
    background: var(--paper);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'%3E%3Cpath fill='%23666' d='M0 0l4 5 4-5z'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    padding-right: 24px;
    min-width: 0;
    max-width: 180px;
    text-overflow: ellipsis;
  }
  .mobile-select:focus { border-color: var(--accent); outline: none; }

  .tb-group { display: flex; align-items: center; gap: 2px; padding: 0 6px; }
  .tb-group + .tb-group { border-left: 1px solid var(--paper-line); }
  .tb-btn {
    padding: 6px 9px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--paper-ink-dim);
    border-radius: 3px;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--paper-line); color: var(--paper-ink); }
  .tb-btn.active { background: var(--accent); color: white; }
  .tb-btn .k { font-size: 9px; opacity: 0.5; margin-left: 2px; }

  .tb-right {
    margin-left: auto;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .record-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--paper-line);
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--paper-ink-dim);
    transition: all 0.15s;
  }
  .record-btn:hover { border-color: var(--accent); color: var(--accent); }
  .record-btn.recording {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    animation: pulse 1.8s infinite;
  }
  .rec-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 90, 0, 0.5); }
    50% { box-shadow: 0 0 0 6px rgba(255, 90, 0, 0); }
  }
  .submit-btn {
    padding: 6px 14px;
    background: var(--accent);
    color: white;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: var(--accent-dim); }

  .script-header { padding: 32px 64px 16px; flex-shrink: 0; }
  .script-breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--paper-ink-dim);
    margin-bottom: 10px;
  }
  .script-breadcrumb .sep { opacity: 0.5; margin: 0 6px; }
  .script-breadcrumb .cur { color: var(--accent); font-weight: 500; }
  .script-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 0.02em;
    color: var(--paper-ink);
    outline: none;
    line-height: 1;
    margin-bottom: 8px;
  }
  .script-title:empty::before {
    content: 'Título do roteiro';
    opacity: 0.4;
  }
  .script-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--paper-ink-dim);
  }
  .script-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 64px 200px;
  }
  .editor {
    font-family: 'Newsreader', serif;
    font-size: 17px;
    line-height: 1.7;
    color: var(--paper-ink);
    outline: none;
    min-height: 400px;
  }
  .editor:empty::before {
    content: 'Comece a escrever o roteiro...';
    opacity: 0.4;
    font-style: italic;
    pointer-events: none;
  }
  .editor h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    letter-spacing: 0.02em;
    margin: 28px 0 14px;
    line-height: 1.1;
  }
  .editor h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 0.02em;
    margin: 24px 0 12px;
    line-height: 1.15;
  }
  .editor h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin: 20px 0 8px;
  }
  .editor h4 {
    font-family: 'Newsreader', serif;
    font-size: 17px;
    font-weight: 600;
    margin: 14px 0 6px;
  }
  .editor p { margin-bottom: 14px; }
  .editor ul, .editor ol { margin: 0 0 14px 24px; }
  .editor li { margin-bottom: 6px; }
  .editor b, .editor strong { font-weight: 600; }
  .editor i, .editor em { font-style: italic; }
  .editor u { text-decoration: underline; }

  /* Synced block: inline editable, mirrored */
  .synced-block {
    display: inline;
    padding: 2px 8px;
    margin: 0 1px;
    background: var(--synced-bg);
    border-left: 3px solid var(--synced-bd);
    border-radius: 2px;
    font-family: 'Newsreader', serif;
    position: relative;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
  .synced-block[contenteditable="true"]:focus {
    outline: 2px solid var(--synced-bd);
    outline-offset: 1px;
  }
  .synced-block::before {
    content: '◉ ' attr(data-sync-id);
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--synced-ink);
    margin-right: 6px;
    font-weight: 700;
    vertical-align: middle;
    user-select: none;
    cursor: default;
  }

  /* Capture block (green, for live responses during call) */
  .capture-block {
    display: inline;
    padding: 2px 8px;
    margin: 0 1px;
    background: var(--capture-bg);
    border-left: 3px solid var(--capture-bd);
    border-radius: 2px;
    font-family: 'Newsreader', serif;
    position: relative;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
  .capture-block[contenteditable="true"]:focus {
    outline: 2px solid var(--capture-bd);
    outline-offset: 1px;
  }
  .capture-block::before {
    content: '📥 ' attr(data-capture-id);
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--capture-ink);
    margin-right: 6px;
    font-weight: 700;
    vertical-align: middle;
    user-select: none;
    cursor: default;
  }
  .capture-block:empty::after {
    content: 'anotar resposta do lead...';
    font-style: italic;
    opacity: 0.5;
    font-size: 14px;
  }

  }

  .backdrop {

    inset: 0;

const STATE_KEY = 'brade-call-engine-v3';

const defaultState = {

  ],

    { id: 'obj-pensar', title: 'Preciso pensar', root: 'Falta clareza do próximo passo ou urgência real.', response: 'Sem problema. Só pra eu te direcionar certo — tu precisa pensar sobre o investimento ou sobre se isso atende tua necessidade?', followup: '' }
  ],

    prospecting: 'active-ss',

  },
  // scripts is a map: key = "prospectingId|channelId|profileId" -> { title, content }
  scripts: {
    'active-ss|ch-dm|p-closer': {
      title: 'Ativa / Social Selling — DM (Closer)',
      content: `<h3>Abertura</h3>
<p>Fulano, eu <b>ODEIO</b> conversa genérica. <span class="synced-block" contenteditable="true" data-sync-id="s1">Se tu pudesse consertar uma coisa nas tuas vendas hoje, o que seria?</span></p>

<h3>Captura da resposta</h3>
<p>Escuta e anota: <span class="capture-block" contenteditable="true" data-capture-id="c1"></span></p>

<h3>Consciência</h3>
<p>Tu já fez algum curso da área comercial, contratou alguém, estudou sobre, ou tá tentando sozinho?</p>

<h3>Urgência</h3>

<h3>Recap</h3>
<p>Pra confirmar: tu me disse que o aperto principal é <span class="ref-block" data-ref-id="c1"></span>. Faz sentido a gente montar a call pra atacar exatamente isso.</p>`
    }
  },
  selectedObjection: null,
  savedAt: Date.now()
};

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(defaultState));
    const parsed = JSON.parse(raw);
    const merged = { ...JSON.parse(JSON.stringify(defaultState)), ...parsed };
    // Ensure scripts object exists
    if (!merged.scripts) merged.scripts = defaultState.scripts;
    return merged;
  } catch (e) { return JSON.parse(JSON.stringify(defaultState)); }
}

let state = loadState();
document.body.setAttribute('data-theme', state.theme || 'orange');

let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    state.savedAt = Date.now();
    localStorage.setItem(STATE_KEY, JSON.stringify(state));
    document.getElementById('meta-saved').textContent = 'salvo agora';
  }, 400);
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getScriptKey() {
  return [
    state.selected.prospecting || '_',
    state.selected.channel || '_',
    state.selected.profile || '_'
  ].join('|');
}

function ensureScriptForCurrent() {
  const key = getScriptKey();
  if (!state.scripts[key]) {
    // Build a friendly title
    let title = '';
    for (const p of state.prospecting) {
      const c = p.children.find(c => c.id === state.selected.prospecting);
      if (c) { title += p.label + ' / ' + c.label; break; }
    }
    const ch = state.channels.find(c => c.id === state.selected.channel);
    if (ch) title += (title ? ' — ' : '') + ch.label;
    const prof = state.profiles.find(p => p.id === state.selected.profile);
    if (prof) title += (title ? ' (' + prof.label + ')' : prof.label);

    state.scripts[key] = {
      title: title || 'Novo roteiro',
      content: '<p></p>'
    };
  }
  return state.scripts[key];
}

// ============ MODAL ============
function openModal({ title, hint, input, value, placeholder, onConfirm, customContent, actions }) {
  const bg = document.getElementById('modal-bg');
  const modalTitle = document.getElementById('modal-title');
  const modalHint = document.getElementById('modal-hint');
  const modalContent = document.getElementById('modal-content');
  const modalActions = document.getElementById('modal-actions');

  modalTitle.textContent = title || 'Atenção';
  if (hint) {
    modalHint.textContent = hint;
    modalHint.style.display = 'block';
  } else {
    modalHint.style.display = 'none';
  }

  if (customContent) {
    modalContent.innerHTML = customContent;
  } else {
    modalContent.innerHTML = `<input type="text" class="modal-input" id="modal-input" placeholder="${escapeHtml(placeholder || 'Nome')}" value="${escapeHtml(value || '')}">`;
  }

  if (actions) {
    modalActions.innerHTML = '';
    actions.forEach(a => {
      const btn = document.createElement('button');
      btn.className = 'modal-btn ' + (a.variant || 'ghost');
      btn.textContent = a.label;
      btn.onclick = () => { a.onClick && a.onClick(); };
      modalActions.appendChild(btn);
    });
  } else {
    modalActions.innerHTML = `
      <button class="modal-btn ghost" id="modal-cancel">Cancelar</button>
      <button class="modal-btn primary" id="modal-confirm">Confirmar</button>
    `;
  }

  bg.classList.add('open');

  setTimeout(() => {
    const input = document.getElementById('modal-input');
    if (input) { input.focus(); input.select(); }
  }, 50);

  const cancelBtn = document.getElementById('modal-cancel');
  const confirmBtn = document.getElementById('modal-confirm');
  const inputEl = document.getElementById('modal-input');

  const close = () => bg.classList.remove('open');

  if (cancelBtn) cancelBtn.onclick = close;
  if (confirmBtn && onConfirm) {
    confirmBtn.onclick = () => {
      const val = inputEl ? inputEl.value.trim() : null;
      onConfirm(val);
      close();
    };
  }
  if (inputEl) {
    inputEl.onkeydown = (e) => {
      if (e.key === 'Enter' && confirmBtn) confirmBtn.click();
      if (e.key === 'Escape') close();
    };
  }

  return close;
}

function promptInput(title, placeholder = 'Nome', value = '') {
  return new Promise(resolve => {
    openModal({
      title,
      placeholder,
      value,
      onConfirm: (val) => resolve(val || null)
    });
    const bg = document.getElementById('modal-bg');
    // close on cancel -> resolve null
    document.getElementById('modal-cancel').onclick = () => {
      bg.classList.remove('open');
      resolve(null);
    };
  });
}

function toast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('open');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('open'), duration);
}

// ============ PROSPECTING TREE ============
function renderProspecting() {
  const el = document.getElementById('prospecting-tree');
  el.innerHTML = '';

  state.prospecting.forEach(parent => {
    const group = document.createElement('div');
    group.className = 'tree-group';

    const parentEl = document.createElement('div');
    parentEl.className = 'tree-parent' + (parent.collapsed ? ' collapsed' : '');
    parentEl.dataset.parentId = parent.id;
    parentEl.innerHTML = `
      <span class="caret">▼</span>
      <span class="parent-label">${escapeHtml(parent.label)}</span>
      <span class="parent-actions">
        <button class="icon-btn" data-act="add-child" data-id="${parent.id}" title="Nova sub-opção">＋</button>
        <button class="icon-btn" data-act="rename-parent" data-id="${parent.id}" title="Renomear">✎</button>
        <button class="icon-btn danger" data-act="delete-parent" data-id="${parent.id}" title="Excluir">✕</button>
      </span>
    `;
    group.appendChild(parentEl);

    const childrenEl = document.createElement('div');
    childrenEl.className = 'tree-children' + (parent.collapsed ? ' collapsed' : '');

    parent.children.forEach(child => {
      const childEl = document.createElement('div');
      childEl.className = 'tree-item' + (state.selected.prospecting === child.id ? ' active' : '');
      childEl.dataset.id = child.id;
      childEl.innerHTML = `
        <span class="item-label">${escapeHtml(child.label)}</span>
        <span class="item-actions">
          <button class="icon-btn" data-act="rename-child" data-parent="${parent.id}" data-id="${child.id}">✎</button>
          <button class="icon-btn danger" data-act="delete-child" data-parent="${parent.id}" data-id="${child.id}">✕</button>
        </span>
      `;
      childrenEl.appendChild(childEl);
    });

    group.appendChild(childrenEl);
    el.appendChild(group);
  });
}

document.getElementById('prospecting-tree').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-act]');
  if (btn) {
    e.stopPropagation();
    const act = btn.dataset.act;
    const id = btn.dataset.id;

    if (act === 'add-child') {
      const name = await promptInput('Nova sub-opção', 'Ex: LinkedIn outbound');
      if (!name) return;
      state.prospecting.find(p => p.id === id).children.push({ id: 'p-' + Date.now(), label: name });
    } else if (act === 'rename-parent') {
      const p = state.prospecting.find(x => x.id === id);
      const name = await promptInput('Renomear categoria', 'Nome', p.label);
      if (!name) return;
      p.label = name;
    } else if (act === 'delete-parent') {
      const p = state.prospecting.find(x => x.id === id);
      if (!confirm(`Excluir "${p.label}" e todas as sub-opções?`)) return;
      state.prospecting = state.prospecting.filter(x => x.id !== id);
    } else if (act === 'rename-child') {
      const p = state.prospecting.find(x => x.id === btn.dataset.parent);
      const c = p.children.find(x => x.id === id);
      const name = await promptInput('Renomear', 'Nome', c.label);
      if (!name) return;
      c.label = name;
    } else if (act === 'delete-child') {
      const p = state.prospecting.find(x => x.id === btn.dataset.parent);
      const c = p.children.find(x => x.id === id);
      if (!confirm(`Excluir "${c.label}"?`)) return;
      p.children = p.children.filter(x => x.id !== id);
      if (state.selected.prospecting === id) state.selected.prospecting = null;
    }
    renderAll();
    save();
    return;
  }

  const item = e.target.closest('.tree-item');
  if (item) {
    selectProspecting(item.dataset.id);
    return;
  }

  const parent = e.target.closest('.tree-parent');
  if (parent) {
    const p = state.prospecting.find(x => x.id === parent.dataset.parentId);
    if (p) {
      p.collapsed = !p.collapsed;
      renderProspecting();
      save();
    }
  }
});

}

function updateBreadcrumb() {
  const parts = [];
  for (const p of state.prospecting) {
    const c = p.children.find(c => c.id === state.selected.prospecting);
    if (c) { parts.push(p.label, c.label); break; }
  }
  const ch = state.channels.find(c => c.id === state.selected.channel);
  if (ch) parts.push(ch.label);
  const prof = state.profiles.find(p => p.id === state.selected.profile);
  if (prof) parts.push(prof.label);

  const el = document.getElementById('breadcrumb');
  if (parts.length === 0) {
    el.innerHTML = '<span>Roteiro</span>';
  } else {
    el.innerHTML = parts.map((p, i) => {
      const isLast = i === parts.length - 1;
      return `<span${isLast ? ' class="cur"' : ''}>${escapeHtml(p)}</span>`;
    }).join('<span class="sep">›</span>');
  }
}

// ============ SYNCED / CAPTURE / REF ============
function nextId(prefix, attribute) {
  const existing = Array.from(editor.querySelectorAll(`[${attribute}]`))
    .map(el => el.getAttribute(attribute));
  let n = 1;
  while (existing.includes(prefix + n)) n++;
  return prefix + n;
}

function insertInlineBlock(className, attrName, attrValue, content, editable) {
  const sel = window.getSelection();
  if (!sel.rangeCount || !editor.contains(sel.anchorNode)) {
    // focus editor and try end
    editor.focus();
    const range = document.createRange();
    range.selectNodeContents(editor);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  const range = sel.getRangeAt(0);
  const selectedText = range.toString();

  const span = document.createElement('span');
  span.className = className;
  span.setAttribute(attrName, attrValue);
  if (editable) span.contentEditable = 'true';
  else span.contentEditable = 'false';
  span.textContent = selectedText || content || '';

  range.deleteContents();
  range.insertNode(span);

  // Add a space after for cursor
  const space = document.createTextNode(' ');
  span.parentNode.insertBefore(space, span.nextSibling);

  const newRange = document.createRange();
  newRange.setStartAfter(space);
  newRange.collapse(true);
  sel.removeAllRanges();
  sel.addRange(newRange);

  return span;
}

document.getElementById('add-synced').onclick = () => {
  const id = nextId('s', 'data-sync-id');
  const sel = window.getSelection();
  const selectedText = sel.rangeCount ? sel.toString() : '';

  if (!selectedText) {
    toast('Selecione o texto que vai virar synced (mesmo conteúdo em vários lugares) e clique de novo.', 4500);
    return;
  }

  const span = insertInlineBlock('synced-block', 'data-sync-id', id, '', true);
  editor.dispatchEvent(new Event('input'));
  toast(`◉ Synced ${id} criado. Use "→ Ref" em outro lugar pra reutilizar o mesmo texto.`, 4500);
};

document.getElementById('add-ref').onclick = () => {
  const synced = Array.from(editor.querySelectorAll('.synced-block'));
  const captures = Array.from(editor.querySelectorAll('.capture-block'));

  if (synced.length === 0 && captures.length === 0) {
    toast('Nenhum Synced ou Captura no roteiro ainda. Crie um primeiro.', 4000);
    return;
  }

  // Save cursor position
  const sel = window.getSelection();
  let savedRange = null;
  if (sel.rangeCount && editor.contains(sel.anchorNode)) {
    savedRange = sel.getRangeAt(0).cloneRange();
  }

  // Build picker UI
  let html = '<div class="picker-list">';
  synced.forEach(s => {
    const preview = (s.textContent || '').slice(0, 80);
    html += `
      <div class="picker-item" data-id="${s.dataset.syncId}">
        <span class="picker-icon synced">◉ ${s.dataset.syncId}</span>
        <span class="picker-preview">${escapeHtml(preview) || '<em>(vazio)</em>'}</span>
      </div>
    `;
  });
  captures.forEach(c => {
    const preview = (c.textContent || '').slice(0, 80);
    html += `
      <div class="picker-item" data-id="${c.dataset.captureId}">
        <span class="picker-icon capture">📥 ${c.dataset.captureId}</span>
        <span class="picker-preview">${escapeHtml(preview) || '<em>(aguardando resposta)</em>'}</span>
      </div>
    `;
  });
  html += '</div>';

  openModal({
    title: 'Escolha o que referenciar',
    hint: 'O texto daqui vai aparecer no lugar onde está seu cursor. Se editar o original, a referência atualiza sozinha.',
    customContent: html,
    actions: [{ label: 'Cancelar', variant: 'ghost', onClick: () => document.getElementById('modal-bg').classList.remove('open') }]
  });

  // Attach click handlers to picker items
  setTimeout(() => {
    document.querySelectorAll('.picker-item').forEach(item => {
      item.onclick = () => {
        const id = item.dataset.id;
        document.getElementById('modal-bg').classList.remove('open');

        // Restore cursor
        if (savedRange) {
          const s = window.getSelection();
          s.removeAllRanges();
          s.addRange(savedRange);
        }

        insertInlineBlock('ref-block', 'data-ref-id', id, '', false);
        syncReferences();
        editor.dispatchEvent(new Event('input'));
        toast(`→ Referência a ${id} inserida.`, 2500);
      };
    });
  }, 100);
};

function syncReferences() {
  const blocks = {};
  editor.querySelectorAll('.synced-block').forEach(el => {
    blocks[el.dataset.syncId] = el.innerHTML;
  });
  editor.querySelectorAll('.capture-block').forEach(el => {
    blocks[el.dataset.captureId] = el.innerHTML;
  });
  editor.querySelectorAll('.ref-block').forEach(el => {
    const id = el.dataset.refId;
    if (blocks[id] !== undefined) {
      el.innerHTML = blocks[id] || `<span class="ref-placeholder">(${id} está vazio)</span>`;
    } else {
      el.innerHTML = `<span class="ref-placeholder">[ref perdida: ${id}]</span>`;
    }
  });
}

let colorMode = 'text'; // 'text' or 'highlight'
let savedSelectionRange = null;

function saveSelection() {
  const sel = window.getSelection();
  if (sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
    savedSelectionRange = sel.getRangeAt(0).cloneRange();
  }
}

function restoreSelection() {
  if (savedSelectionRange) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedSelectionRange);
  }
}

function openColorPopover(mode, anchorBtn) {
  colorMode = mode;
  saveSelection();

  const popover = document.getElementById('color-popover');
  const label = document.getElementById('color-popover-label');
  const grid = document.getElementById('color-grid');

  label.textContent = mode === 'text' ? 'Cor do texto' : 'Marca-texto';

  const colors = mode === 'text' ? textColors : highlightColors;
  grid.innerHTML = colors.map(({ c, label }) => {
    if (c === null) {
      return `<div class="color-swatch clear" data-color="null" title="${label}">✕</div>`;
    }
    return `<div class="color-swatch" style="background:${c}" data-color="${c}" title="${label}"></div>`;
  }).join('');

  // Position popover under the button
  const rect = anchorBtn.getBoundingClientRect();
  popover.style.top = (rect.bottom + 6) + 'px';
  popover.style.left = rect.left + 'px';
  popover.classList.add('open');

  // Attach click handlers
  grid.querySelectorAll('.color-swatch').forEach(sw => {
    sw.onclick = (e) => {
      e.stopPropagation();
      const color = sw.dataset.color;
      applyColor(color);
      popover.classList.remove('open');
    };
  });
}

function applyColor(color) {
  editor.focus();
  restoreSelection();

  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) {
    toast('Selecione o texto primeiro.', 2500);
    return;
  }

  if (colorMode === 'text') {
    if (color === 'null' || color === null) {
      // Remove color by applying inherited/default
      document.execCommand('foreColor', false, 'inherit');
      // execCommand doesn't really support "remove color" cleanly; this is a best-effort
      // Better: wrap/unwrap via manual DOM
      removeInlineStyle('color');
    } else {
      document.execCommand('foreColor', false, color);
    }
  } else {
    if (color === 'null' || color === null) {
      document.execCommand('hiliteColor', false, 'transparent');
      removeInlineStyle('background-color');
    } else {
      // Firefox uses 'hiliteColor', Chrome accepts both 'hiliteColor' and 'backColor'
      if (!document.execCommand('hiliteColor', false, color)) {
        document.execCommand('backColor', false, color);
      }
    }
  }

  editor.dispatchEvent(new Event('input'));
}

function removeInlineStyle(prop) {
  // For the current selection, remove the style property from wrapping spans
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  // Walk through the selected nodes and clean their inline style
  const walker = document.createTreeWalker(
    range.commonAncestorContainer,
    NodeFilter.SHOW_ELEMENT,
    { acceptNode: n => range.intersectsNode(n) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP }
  );
  let node;
  while ((node = walker.nextNode())) {
    if (node.style && node.style[prop]) {
      node.style[prop] = '';
      if (!node.getAttribute('style')) node.removeAttribute('style');
    }
  }
}

// ============ WHISPER ============
let whisperPipeline = null;
let whisperLoading = false;
let mediaRecorder = null;
let audioChunks = [];
let recordingStream = null;
let transcriptText = '';

async function loadWhisper() {
  if (whisperPipeline) return whisperPipeline;
  if (whisperLoading) return null;
  whisperLoading = true;

  toast('Carregando Whisper (primeira vez: 30-90s)...', 8000);

  try {
    const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    whisperPipeline = await pipeline('automatic-speech-recognition', 'Xenova/whisper-small', {
      quantized: true
    });
    whisperLoading = false;
    toast('Whisper carregado ✓', 2000);
    return whisperPipeline;
  } catch (e) {
    whisperLoading = false;
    console.error(e);
    toast('Erro ao carregar Whisper: ' + e.message, 5000);
    return null;
  }
}

document.getElementById('record-btn').addEventListener('click', async () => {
  const btn = document.getElementById('record-btn');
  if (btn.classList.contains('recording')) {
    stopRecording();
  } else {
    await startRecording();
  }
});

async function startRecording() {
  try {
    recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    return toast('Permissão de microfone negada.', 3000);
  }

  loadWhisper();

  const btn = document.getElementById('record-btn');
  btn.classList.add('recording');
  document.getElementById('rec-label').textContent = 'Parar';
  document.getElementById('transcript-panel').classList.add('open');
  document.getElementById('transcript-body').innerHTML = '<em style="opacity:0.6">Gravando... fale normalmente. A transcrição começa após parar.</em>';

  audioChunks = [];
  const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
  mediaRecorder = new MediaRecorder(recordingStream, { mimeType });
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };
  mediaRecorder.start();
}

async function stopRecording() {
  if (!mediaRecorder) return;
  mediaRecorder.stop();
  recordingStream.getTracks().forEach(t => t.stop());

  const btn = document.getElementById('record-btn');
  btn.classList.remove('recording');
  document.getElementById('rec-label').textContent = 'Transcrevendo...';

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
    const arrayBuffer = await blob.arrayBuffer();

    const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    let audioData;
    try {
      const decoded = await audioContext.decodeAudioData(arrayBuffer);
      audioData = decoded.getChannelData(0);
    } catch (e) {
      toast('Erro ao decodificar áudio.', 3000);
      document.getElementById('rec-label').textContent = 'Transcrever';
      return;
    }

    const pipeline = await loadWhisper();
    if (!pipeline) {
      document.getElementById('rec-label').textContent = 'Transcrever';
      return;
    }

    try {
      document.getElementById('transcript-body').innerHTML = '<em style="opacity:0.6">Processando...</em>';
      const result = await pipeline(audioData, {
        language: 'portuguese',
        task: 'transcribe',
        chunk_length_s: 30,
        stride_length_s: 5
      });
      transcriptText = result.text.trim();
      document.getElementById('transcript-body').textContent = transcriptText;
      document.getElementById('rec-label').textContent = 'Transcrever';
      toast('Transcrição pronta ✓', 2000);
    } catch (e) {
      console.error(e);
      toast('Erro na transcrição: ' + e.message, 4000);
      document.getElementById('rec-label').textContent = 'Transcrever';
    }
  };
}

document.getElementById('transcript-insert').onclick = () => {
  if (!transcriptText) return toast('Nada pra inserir.');
  editor.focus();
